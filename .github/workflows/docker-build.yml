name: Build and Push Docker Image to GitHub Packages

# 全局环境变量：强制 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    paths:
      - 'cas2ss.js'
      - 'package.json'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write  # 必须：推送镜像需要写权限
      contents: read   # 必须：拉取仓库代码需要读权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Login to GitHub Packages
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io  # 必须：指定登录的镜像仓库
          username: ${{ github.actor }}  # 必须：GitHub 用户名（内置变量）
          password: ${{ secrets.GITHUB_TOKEN }}  # 必须：GitHub 内置秘钥（无需手动添加）
          logout: true

      - name: Build and push
        uses: docker/build-push-action@v5.3.0
        with:
          context: .
          push: true
          no-cache: true
          platforms: linux/amd64
          tags: |
            ghcr.io/sisheng36/cas2ss:latest
            ghcr.io/sisheng36/cas2ss:v1
