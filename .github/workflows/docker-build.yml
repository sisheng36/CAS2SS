name: Build and Push Docker Image to Docker Hub

on:
  push:
    branches: [ main ]  # 主分支推送时触发
    paths:
      - 'strm-push.js'
      - 'package.json'
      - 'Dockerfile'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}  # Docker Hub 用户名
          password: ${{ secrets.DOCKER_HUB_TOKEN }}     # Docker Hub 访问令牌

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/strm-push:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/strm-push:v1  # 版本标签
