name: Build and Push Docker Image to GitHub Packages

# 全局环境变量（作用于整个工作流，包括所有 Action）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    paths:
      - 'cas2ss.js'
      - 'package.json'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      # 升级到最新版：actions/checkout@v4.2.0（完全适配 Node24）
      - name: Checkout code
        uses: actions/checkout@v4.2.0
      
# 其他部分与方案一相同，仅修改以下 Action 版本：
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0  # 或升级到 v4（Node24 原生支持）
      
      - name: Login to GitHub Packages
        uses: docker/login-action@v4.0.1  # v4 已默认使用 Node24
      
      - name: Build and push
        uses: docker/build-push-action@v7.0.0  # 最新主版本，Node24 原生支持
        with:
          context: .
          push: true
          no-cache: true
          platforms: linux/amd64
          tags: |
            ghcr.io/sisheng36/cas2ss:latest
            ghcr.io/sisheng36/cas2ss:v1
