name: Build and Push Docker Image to GitHub Packages

on:
  push:
    branches: [ main ]
    paths:
      - 'cas2ss.js'
      - 'package.json'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write  # 必须：推送镜像需要写权限
      contents: read   # 必须：拉取仓库代码需要读权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # 启用缓存加速构建（可选，首次构建慢，后续快）
        with:
          buildkitd-flags: --debug

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}  # GitHub Secrets中的用户名
          password: ${{ secrets.DOCKER_HUB_TOKEN }}     # GitHub Secrets中的令牌/密码

      # 核心步骤：构建并推送双架构镜像
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .  # Dockerfile所在目录（项目根目录）
          platforms: linux/amd64,linux/arm64  # 同时构建amd64和arm64
          push: true  # 自动推送到Docker Hub
          # 给镜像打标签：latest（通用）+ 架构专属标签（可选）
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/cas2ss:v1.2.8
            ${{ secrets.DOCKER_HUB_USERNAME }}/cas2ss:arm64-v1.2.8
            ${{ secrets.DOCKER_HUB_USERNAME }}/cas2ss:arm64-v1.2.8
            ${{ secrets.DOCKER_HUB_USERNAME }}/cas2ss:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/cas2ss:amd64-latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/cas2ss:arm64-latest
            
      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          repository: ${{ github.repository }}
          # short-description: ${{ github.event.repository.description }}
          enable-url-completion: true
