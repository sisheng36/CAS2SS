name: Build and Push Docker Image to GitHub Packages

# 全局环境变量：强制 Action 用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    paths:
      - 'cas2ss.js'
      - 'package.json'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0
      
      - name: Login to GitHub Packages
        uses: docker/login-action@v4.0.0  # v4 唯一正式版
      
      - name: Build and push
        uses: docker/build-push-action@v5.3.0  # v5 系列最新稳定版（真实存在）
        with:
          context: .
          push: true
          no-cache: true
          platforms: linux/amd64
          tags: |
            ghcr.io/sisheng36/cas2ss:latest
            ghcr.io/sisheng36/cas2ss:v1
