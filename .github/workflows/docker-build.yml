name: Build and Push Docker Image to GitHub Packages

on:
  push:
    branches: [ main ]
    paths:
      - 'cas2ss.js'
      - 'package.json'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write  # 必须：推送镜像需要写权限
      contents: read   # 必须：拉取仓库代码需要读权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}  # GitHub Secrets中的用户名
          password: ${{ secrets.DOCKER_HUB_TOKEN }}     # GitHub Secrets中的令牌/密码

      # 3. 构建Docker镜像（需仓库根目录有Dockerfile）
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/cas2ss:latest .

      # 4. 推送镜像到Docker Hub
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cas2ss:latest

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          repository: ${{ github.repository }}
          # short-description: ${{ github.event.repository.description }}
          enable-url-completion: true
