name: Build and Push Docker Image to GitHub Packages

# 全局环境变量（作用于整个工作流，包括所有 Action）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    paths:
      - 'cas2ss.js'
      - 'package.json'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      # 升级到最新版：actions/checkout@v4.2.0（完全适配 Node24）
      - name: Checkout code
        uses: actions/checkout@v4.2.0
      
      # 升级到最新版：docker/setup-buildx-action@v3.6.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.6.1
      
      # 升级到最新版：docker/login-action@v3.3.0
      - name: Login to GitHub Packages
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # 升级到最新版：docker/build-push-action@v5.5.1
      - name: Build and push
        uses: docker/build-push-action@v5.5.1
        with:
          context: .
          push: true
          no-cache: true
          platforms: linux/amd64
          tags: |
            ghcr.io/sisheng36/cas2ss:latest
            ghcr.io/sisheng36/cas2ss:v1
