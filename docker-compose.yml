services:
  cas2ss:
    image: sisheng36/cas2ss:latest
    container_name: cas2ss
    network_mode: bridge
    restart: always
    ports:
      - "1234:1234"
    environment:
      # ---------- 必填 ----------
      # CAS 服务地址（请替换为你的实际地址），程序会自动拼接 /api/tasks
      - PROJECT_API=http://your-cas-address:3000
      # CAS 后台生成的 API Key
      - API_KEY=your-api-key-here
      # 接收推送的目标 Webhook 地址（来自 SS/Strm Service）
      - TARGET_WEBHOOK=http://your-ss-webhook-url
      # SS 中用于生成 strm 文件的任务名称，多个用英文逗号分隔
      - STRM_TASKS=电影1,电影2,动漫1,动漫2

      # ---------- 可选 ----------
      # Webhook 监听地址，默认 :1234（一般无需修改）
      # - WEBHOOK_LISTEN_ADDR=:1234
      # 时区
      - TZ=Asia/Shanghai
    volumes:
      # 将已发送任务记录持久化到宿主机当前目录下的 cas2ss 文件夹
      - ./cas2ss:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
